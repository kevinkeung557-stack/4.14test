<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>企业微信</title>
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* ========================================= */
        /* 公共图片层 */
        /* ========================================= */
        .img-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* ========================================= */
        /* 侧边栏 */
        /* ========================================= */
        #sidebar  { background-image: url('sidebar.png'); z-index: 10; }

        /* ========================================= */
        /* 首页（默认全屏覆盖，侧边栏关闭） */
        /* ========================================= */
        #home {
            background-image: url('home.png');
            z-index: 30;
            transform: translateY(-5px);
            transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1), border-radius 0.4s;
        }
        #home.open {
            transform: translateX(85vw) translateY(-5px) scale(0.94);
            border-radius: 12px;
        }

        /* ========================================= */
        /* 关闭遮罩（侧边栏打开时，罩住首页，点一下关侧边栏） */
        /* ========================================= */
        #closeMask {
            position: fixed;
            top: 0;
            left: 15vw;   /* 右侧85%区域 */
            width: 85vw;
            height: 100vh;
            z-index: 41;
            display: none;
        }
        #home.open ~ #closeMask { display: block; }

        /* ========================================= */
        /* 汉堡菜单按钮（始终在最上层） */
        /* ========================================= */
        #menuBtn {
            position: fixed;
            top: 0;
            left: 0;
            width: 70px;
            height: 100px;
            z-index: 500;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        /* ========================================= */
        /* 侧边栏头像/名字热区（始终可点击，打开个人资料） */
        /* ========================================= */
        #profileHotspot {
            position: fixed;
            top: 40px;
            left: 0;
            width: 280px;
            height: 120px;
            z-index: 400;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        /* ========================================= */
        /* 底部 Tab 栏 */
        /* ========================================= */
        #tabBar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 68px;
            z-index: 200;
            display: flex;
        }
        .tab {
            flex: 1;
            height: 100%;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        /* ========================================= */
        /* 四个频道页面（默认隐藏，点击后直接显示，无动画） */
        /* ========================================= */
        .page {
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
        }
        .page.show {
            visibility: visible;
            opacity: 1;
            pointer-events: auto;
        }
        #pj { background-image: url('youjian.png'); }
        #pwd { background-image: url('wendang.png'); }
        #pgzt { background-image: url('gongzuotai.png'); }
        #ptxl { background-image: url('tongxunlu.png'); }

        /* ========================================= */
        /* 个人资料页 */
        /* ========================================= */
        #profileLayer {
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
            transition: none;
        }
        #profileLayer.show {
            visibility: visible;
            opacity: 1;
            pointer-events: auto;
        }

        /* 个人资料背景图（接收橡皮筋触摸） */
        #profileBg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('profile.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            touch-action: pan-y;
        }

        /* 返回按钮（放在 profileLayer 外面，直接在 body 下）*/
        #profileBack {
            position: fixed;
            top: 40px;
            left: 0;
            width: 80px;
            height: 60px;
            z-index: 300;
            background: transparent;
            border: none;
            cursor: pointer;
            display: none;
        }

    </style>
</head>
<body>

    <!-- 侧边栏（最底层） -->
    <div class="img-layer" id="sidebar"></div>

    <!-- 首页（默认全屏） -->
    <div class="img-layer" id="home"></div>

    <!-- 关闭遮罩 -->
    <div id="closeMask"></div>

    <!-- 汉堡菜单按钮（最顶层） -->
    <button id="menuBtn"></button>

    <!-- 侧边栏头像/名字热区 -->
    <button id="profileHotspot"></button>

    <!-- 底部 Tab -->
    <div id="tabBar">
        <button class="tab" id="tHome"></button>
        <button class="tab" id="tYj"></button>
        <button class="tab" id="tWd"></button>
        <button class="tab" id="tGzt"></button>
        <button class="tab" id="tTxl"></button>
    </div>

    <!-- 四个频道页面 -->
    <div class="img-layer page" id="pj"></div>
    <div class="img-layer page" id="pwd"></div>
    <div class="img-layer page" id="pgzt"></div>
    <div class="img-layer page" id="ptxl"></div>

    <!-- 个人资料页 -->
    <div class="img-layer" id="profileLayer">
        <div id="profileBg"></div>
    </div>
    <button id="profileBack"></button>

    <script>
        /* ========================= */
        /* 侧边栏 */
        /* ========================= */
        var home = document.getElementById('home');
        var closeMask = document.getElementById('closeMask');
        var menuBtn = document.getElementById('menuBtn');

        menuBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            home.classList.toggle('open');
        });

        // 点首页右侧区域，关闭侧边栏
        closeMask.addEventListener('click', function(e) {
            e.stopPropagation();
            home.classList.remove('open');
        });

        /* ========================= */
        /* 打开个人资料页 */
        /* ========================= */
        document.getElementById('profileHotspot').addEventListener('click', function(e) {
            e.stopPropagation();
            document.getElementById('profileLayer').classList.add('show');
        });

        /* ========================= */
        /* 打开个人资料页 */
        /* ========================= */
        document.getElementById('profileHotspot').addEventListener('click', function(e) {
            e.stopPropagation();
            document.getElementById('profileLayer').classList.add('show');
            document.getElementById('profileBack').style.display = 'block';
        });

        /* ========================= */
        /* 关闭个人资料页 */
        /* ========================= */
        document.getElementById('profileBack').addEventListener('click', function(e) {
            e.stopPropagation();
            document.getElementById('profileLayer').classList.remove('show');
            document.getElementById('profileBack').style.display = 'none';
        });

        /* ========================= */
        /* Tab 切换 */
        /* ========================= */
        var tabs = ['Home', 'Yj', 'Wd', 'Gzt', 'Txl'];
        var pages = { Yj: 'pj', Wd: 'pwd', Gzt: 'pgzt', Txl: 'ptxl' };

        tabs.forEach(function(tab) {
            document.getElementById('t' + tab).addEventListener('click', function() {
                // 关闭侧边栏
                home.classList.remove('open');
                // 隐藏所有频道页
                Object.values(pages).forEach(function(id) {
                    document.getElementById(id).classList.remove('show');
                });
                // 取消所有 Tab 高亮（用 background）
                tabs.forEach(function(t) {
                    document.getElementById('t' + t).style.background = 'transparent';
                });
                // 显示对应页面
                if (tab !== 'Home') {
                    document.getElementById(pages[tab]).classList.add('show');
                }
                // 高亮当前 Tab
                document.getElementById('t' + tab).style.background = 'rgba(0,150,255,0.3)';
            });
        });

        /* ========================= */
        /* 橡皮筋弹性滑动（个人资料） */
        /* ========================= */
        (function() {
            var el = document.getElementById('profileBg');
            var startY = 0, baseY = 0, dragging = false;
            var R = 0.4, MAX = 120;

            el.addEventListener('touchstart', function(e) {
                dragging = true;
                startY = e.touches[0].clientY;
                baseY = 0;
                el.style.transition = 'none';
            }, { passive: true });

            el.addEventListener('touchmove', function(e) {
                if (!dragging) return;
                e.preventDefault();
                var delta = (e.touches[0].clientY - startY) * R;
                if (delta > MAX)  delta = MAX;
                if (delta < -MAX) delta = -MAX;
                el.style.transform = 'translateY(' + delta + 'px)';
            }, { passive: false });

            function springBack() {
                el.style.transition = 'transform 0.5s cubic-bezier(0.34,1.56,0.64,1)';
                el.style.transform = 'translateY(0)';
                setTimeout(function() { el.style.transition = 'none'; }, 600);
            }

            el.addEventListener('touchend',   function() { if (dragging) { dragging = false; springBack(); } });
            el.addEventListener('touchcancel', function() { if (dragging) { dragging = false; springBack(); } });
        })();

        /* 禁止全局弹性滚动 */
        document.addEventListener('touchmove', function(e) {
            var pl = document.getElementById('profileLayer');
            if (pl.classList.contains('show')) e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
