<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>企业微信</title>
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            image-rendering: -webkit-optimize-contrast;
            color-profile: sRGB;
        }

        .app-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* 侧边栏 */
        .sidebar-bg {
            background-image: url('sidebar.png');
            z-index: 10;
        }

        .sidebar-profile-trigger {
            position: absolute;
            top: 40px;
            left: 0;
            width: 300px;
            height: 120px;
            z-index: 20;
        }

        /* 消息页（首页） */
        .main-container {
            background-image: url('home.png');
            z-index: 30;
            transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1), border-radius 0.4s;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            transform: translateY(-5px);
        }

        .main-container.open {
            transform: translateX(85vw) translateY(-5px) scale(0.94);
            border-radius: 12px;
        }

        .menu-trigger {
            position: absolute;
            top: 0;
            left: 0;
            width: 70px;
            height: 100px;
            z-index: 40;
        }

        .close-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 41;
        }
        .main-container.open .close-overlay {
            display: block;
        }

        /* 底部 Tab 栏 */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 68px;
            z-index: 50;
            display: flex;
        }

        .tab-btn {
            flex: 1;
            height: 100%;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        /* 频道页面 */
        .page-layer {
            z-index: 60;
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            box-shadow: -10px 0 30px rgba(0,0,0,0.3);
        }

        .page-layer.show {
            transform: translateX(0);
        }

        .youjian-layer    { background-image: url('youjian.png'); }
        .wendang-layer    { background-image: url('wendang.png'); }
        .gongzuotai-layer { background-image: url('gongzuotai.png'); }
        .tongxunlu-layer  { background-image: url('tongxunlu.png'); }

        /* 个人资料页 */
        .profile-layer {
            background-image: url('profile.png');
            z-index: 100;
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            box-shadow: -10px 0 30px rgba(0,0,0,0.3);
        }

        .profile-layer.show {
            transform: translateX(0);
        }

        .profile-back-trigger {
            position: absolute;
            top: 40px;
            left: 0;
            width: 80px;
            height: 60px;
            z-index: 110;
            cursor: pointer;
        }

    </style>
</head>
<body>

    <!-- 侧边栏 -->
    <div class="sidebar-bg app-layer">
        <div class="sidebar-profile-trigger" onclick="showProfile(event)"></div>
    </div>

    <!-- 消息页（首页） -->
    <div class="main-container app-layer" id="app">
        <div class="menu-trigger" onclick="toggleMenu(event)"></div>
        <div class="close-overlay" onclick="toggleMenu(event)"></div>
    </div>

    <!-- 底部 Tab：消息 / 邮件 / 文档 / 工作台 / 通讯录 -->
    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('home')"></button>
        <button class="tab-btn" onclick="switchTab('youjian')"></button>
        <button class="tab-btn" onclick="switchTab('wendang')"></button>
        <button class="tab-btn" onclick="switchTab('gongzuotai')"></button>
        <button class="tab-btn" onclick="switchTab('tongxunlu')"></button>
    </div>

    <!-- 邮件页 -->
    <div class="page-layer youjian-layer app-layer" id="pageYoujian"></div>

    <!-- 文档页 -->
    <div class="page-layer wendang-layer app-layer" id="pageWendang"></div>

    <!-- 工作台页 -->
    <div class="page-layer gongzuotai-layer app-layer" id="pageGongzuotai"></div>

    <!-- 通讯录页 -->
    <div class="page-layer tongxunlu-layer app-layer" id="pageTongxunlu"></div>

    <!-- 个人资料页 -->
    <div class="profile-layer app-layer" id="profilePage">
        <div class="profile-back-trigger" onclick="hideProfile(event)"></div>
    </div>

    <script>
        function toggleMenu(e) {
            e.stopPropagation();
            document.getElementById('app').classList.toggle('open');
        }

        function switchTab(tab) {
            // 关闭侧边栏
            document.getElementById('app').classList.remove('open');

            // 隐藏所有频道页
            document.querySelectorAll('.page-layer').forEach(el => el.classList.remove('show'));

            // 取消所有 Tab 高亮
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));

            // 如果不是首页，显示对应频道页
            if (tab !== 'home') {
                const pageEl = document.getElementById('page' + tab.charAt(0).toUpperCase() + tab.slice(1));
                if (pageEl) pageEl.classList.add('show');
            }

            // 高亮当前 Tab
            const btn = document.querySelector('.tab-btn[onclick="switchTab(\'' + tab + '\')"]');
            if (btn) btn.classList.add('active');
        }

        function showProfile(e) {
            e.stopPropagation();
            document.getElementById('profilePage').classList.add('show');
        }

        function hideProfile(e) {
            e.stopPropagation();
            document.getElementById('profilePage').classList.remove('show');
        }

        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
