<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>企业微信</title>
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            image-rendering: -webkit-optimize-contrast;
            color-profile: sRGB;
        }

        /* ============================================= */
        /* 所有层的公共样式 */
        /* ============================================= */
        .layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* ============================================= */
        /* 1. 侧边栏（最底层，z-index 10）*/
        /* ============================================= */
        .layer-sidebar {
            background-image: url('sidebar.png');
            z-index: 10;
        }

        /* 侧边栏上的头像/名字热区（永远可点击） */
        .hotspot-profile {
            position: fixed;
            top: 40px;
            left: 0;
            width: 280px;
            height: 120px;
            z-index: 400;
        }

        /* ============================================= */
        /* 2. 首页消息页（z-index 30）*/
        /* ============================================= */
        .layer-home {
            background-image: url('home.png');
            z-index: 30;
            transform: translateY(-5px);
            transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1), border-radius 0.4s;
        }

        .layer-home.open {
            transform: translateX(85vw) translateY(-5px) scale(0.94);
            border-radius: 12px;
        }

        /* 点击首页可见区域 → 关闭侧边栏 */
        .hotspot-close-sidebar {
            position: fixed;
            top: 0;
            left: 15vw;  /* 只在右侧15%区域响应（左侧保留给三横线按钮）*/
            width: 85vw;
            height: 100vh;
            z-index: 41;
        }

        /* ============================================= */
        /* 3. 三横线汉堡菜单按钮（独立层，永远可点击）*/
        /* ============================================= */
        .hotspot-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 70px;
            height: 100px;
            z-index: 500;
        }

        /* ============================================= */
        /* 4. 底部 Tab 栏 */
        /* ============================================= */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 68px;
            z-index: 200;
            display: flex;
        }

        .tab-btn {
            flex: 1;
            height: 100%;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        /* ============================================= */
        /* 5. 四个频道页面（无动画，直接显示）*/
        /* ============================================= */
        .layer-page {
            z-index: 60;
            /* 默认隐藏 */
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
        }

        .layer-page.show {
            visibility: visible;
            opacity: 1;
            pointer-events: auto;
        }

        .layer-page-yj    { background-image: url('youjian.png'); }
        .layer-page-wd    { background-image: url('wendang.png'); }
        .layer-page-gzt   { background-image: url('gongzuotai.png'); }
        .layer-page-txl   { background-image: url('tongxunlu.png'); }

        /* ============================================= */
        /* 6. 个人资料页 */
        /* ============================================= */
        .layer-profile {
            z-index: 100;
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
        }

        .layer-profile.show {
            visibility: visible;
            opacity: 1;
            pointer-events: auto;
        }

        /* 个人资料页的背景图（在 content 上，不在 layer 上）*/
        .profile-content {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('profile.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
            touch-action: pan-y;
        }

        /* 返回按钮 */
        .profile-back {
            position: fixed;
            top: 40px;
            left: 0;
            width: 80px;
            height: 60px;
            z-index: 110;
        }

    </style>
</head>
<body>

    <!-- 1. 侧边栏 -->
    <div class="layer layer-sidebar" id="sidebar"></div>

    <!-- 侧边栏头像名字热区（独立于sidebar，始终可点击）-->
    <div class="hotspot-profile" id="hotProfile"></div>

    <!-- 2. 首页消息页 -->
    <div class="layer layer-home" id="homePage">
        <!-- 点击首页右侧区域关闭侧边栏 -->
        <div class="hotspot-close-sidebar" id="hotCloseSidebar"></div>
    </div>

    <!-- 3. 汉堡菜单按钮 -->
    <div class="hotspot-menu" id="hotMenu"></div>

    <!-- 4. 底部 Tab -->
    <div class="tab-bar">
        <button class="tab-btn active" id="btnHome"></button>
        <button class="tab-btn" id="btnYj"></button>
        <button class="tab-btn" id="btnWd"></button>
        <button class="tab-btn" id="btnGzt"></button>
        <button class="tab-btn" id="btnTxl"></button>
    </div>

    <!-- 5. 四个频道页面 -->
    <div class="layer layer-page layer-page-yj" id="pageYj"></div>
    <div class="layer layer-page layer-page-wd" id="pageWd"></div>
    <div class="layer layer-page layer-page-gzt" id="pageGzt"></div>
    <div class="layer layer-page layer-page-txl" id="pageTxl"></div>

    <!-- 6. 个人资料页 -->
    <div class="layer layer-profile" id="profilePage">
        <div class="profile-content" id="profileContent"></div>
        <div class="profile-back" id="profileBack"></div>
    </div>

    <script>
        /* ===================== */
        /* 侧边栏 */
        /* ===================== */
        document.getElementById('hotMenu').addEventListener('click', function(e) {
            e.stopPropagation();
            document.getElementById('homePage').classList.toggle('open');
        });

        document.getElementById('hotCloseSidebar').addEventListener('click', function(e) {
            e.stopPropagation();
            document.getElementById('homePage').classList.remove('open');
        });

        /* ===================== */
        /* 打开个人资料页 */
        /* ===================== */
        document.getElementById('hotProfile').addEventListener('click', function(e) {
            e.stopPropagation();
            document.getElementById('profilePage').classList.add('show');
        });

        /* ===================== */
        /* 关闭个人资料页 */
        /* ===================== */
        document.getElementById('profileBack').addEventListener('click', function(e) {
            e.stopPropagation();
            document.getElementById('profilePage').classList.remove('show');
        });

        /* ===================== */
        /* Tab 切换 */
        /* ===================== */
        function switchTab(tab) {
            // 关闭侧边栏
            document.getElementById('homePage').classList.remove('open');

            // 隐藏所有频道页
            document.getElementById('pageYj').classList.remove('show');
            document.getElementById('pageWd').classList.remove('show');
            document.getElementById('pageGzt').classList.remove('show');
            document.getElementById('pageTxl').classList.remove('show');

            // 取消所有 Tab 高亮
            document.getElementById('btnHome').classList.remove('active');
            document.getElementById('btnYj').classList.remove('active');
            document.getElementById('btnWd').classList.remove('active');
            document.getElementById('btnGzt').classList.remove('active');
            document.getElementById('btnTxl').classList.remove('active');

            // 显示对应页面
            if (tab === 'yj')    { document.getElementById('pageYj').classList.add('show');  document.getElementById('btnYj').classList.add('active'); }
            else if (tab === 'wd')  { document.getElementById('pageWd').classList.add('show');  document.getElementById('btnWd').classList.add('active'); }
            else if (tab === 'gzt') { document.getElementById('pageGzt').classList.add('show'); document.getElementById('btnGzt').classList.add('active'); }
            else if (tab === 'txl') { document.getElementById('pageTxl').classList.add('show'); document.getElementById('btnTxl').classList.add('active'); }
            else                     { document.getElementById('btnHome').classList.add('active'); } // home
        }

        document.getElementById('btnHome').addEventListener('click', function() { switchTab('home'); });
        document.getElementById('btnYj').addEventListener('click',  function() { switchTab('yj'); });
        document.getElementById('btnWd').addEventListener('click',  function() { switchTab('wd'); });
        document.getElementById('btnGzt').addEventListener('click', function() { switchTab('gzt'); });
        document.getElementById('btnTxl').addEventListener('click', function() { switchTab('txl'); });

        /* ===================== */
        /* 橡皮筋弹性滑动（个人资料页） */
        /* ===================== */
        (function() {
            var el = document.getElementById('profileContent');
            var startY = 0;
            var baseY = 0;
            var dragging = false;
            var RESISTANCE = 0.4;
            var MAX_DRAG = 120;

            el.addEventListener('touchstart', function(e) {
                dragging = true;
                startY = e.touches[0].clientY;
                baseY = getCurrentY();
                el.style.transition = 'none';
            }, { passive: true });

            el.addEventListener('touchmove', function(e) {
                if (!dragging) return;
                e.preventDefault();
                var delta = e.touches[0].clientY - startY;
                var resisted = delta * RESISTANCE;
                // 限制最大拉伸
                if (resisted > MAX_DRAG)  resisted = MAX_DRAG;
                if (resisted < -MAX_DRAG)  resisted = -MAX_DRAG;
                el.style.transform = 'translateY(' + (baseY + resisted) + 'px)';
            }, { passive: false });

            el.addEventListener('touchend', function() {
                if (!dragging) return;
                dragging = false;
                el.style.transition = 'transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
                el.style.transform = 'translateY(0)';
                setTimeout(function() { el.style.transition = 'none'; }, 600);
            });

            el.addEventListener('touchcancel', function() {
                if (!dragging) return;
                dragging = false;
                el.style.transition = 'transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
                el.style.transform = 'translateY(0)';
                setTimeout(function() { el.style.transition = 'none'; }, 600);
            });

            function getCurrentY() {
                var m = window.getComputedStyle(el).transform;
                if (m === 'none') return 0;
                return parseFloat(m.split(',')[5]) || 0;
            }
        })();

        /* ===================== */
        /* 全局禁止弹性滚动 */
        /* ===================== */
        document.addEventListener('touchmove', function(e) {
            var p = document.getElementById('profilePage');
            if (p.classList.contains('show')) e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
