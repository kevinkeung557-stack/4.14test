<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>企业微信</title>
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            image-rendering: -webkit-optimize-contrast;
            color-profile: sRGB;
        }

        .app-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* 侧边栏 */
        .sidebar-bg {
            background-image: url('sidebar.png');
            z-index: 10;
        }

        .sidebar-profile-trigger {
            position: absolute;
            top: 40px;
            left: 0;
            width: 300px;
            height: 120px;
            z-index: 20;
        }

        /* 消息页（首页） */
        .main-container {
            background-image: url('home.png');
            z-index: 30;
            transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1), border-radius 0.4s;
            transform: translateY(-5px);
        }

        .main-container.open {
            transform: translateX(85vw) translateY(-5px) scale(0.94);
            border-radius: 12px;
        }

        .menu-trigger {
            position: absolute;
            top: 0;
            left: 0;
            width: 70px;
            height: 100px;
            z-index: 40;
        }

        .close-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 41;
        }
        .main-container.open .close-overlay {
            display: block;
        }

        /* 底部 Tab 栏 — 放在最顶层，保证始终可点击 */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 68px;
            z-index: 200;
            display: flex;
        }

        .tab-btn {
            flex: 1;
            height: 100%;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        /* 频道页面 — 无动画、无阴影、直接显示 */
        .page-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 60;
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
        }

        .page-layer.show {
            visibility: visible;
            opacity: 1;
            pointer-events: auto;
        }

        .youjian-layer    { background-image: url('youjian.png'); }
        .wendang-layer    { background-image: url('wendang.png'); }
        .gongzuotai-layer { background-image: url('gongzuotai.png'); }
        .tongxunlu-layer  { background-image: url('tongxunlu.png'); }

        /* 个人资料页 */
        .profile-layer {
            background-image: url('profile.png');
            z-index: 100;
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            /* 初始隐藏（visibility 配合 transform） */
            visibility: hidden;
        }

        .profile-layer.show {
            transform: translateX(0);
            visibility: visible;
        }

        .profile-back-trigger {
            position: absolute;
            top: 40px;
            left: 0;
            width: 80px;
            height: 60px;
            z-index: 110;
            cursor: pointer;
        }

    </style>
</head>
<body>

    <!-- 侧边栏 -->
    <div class="sidebar-bg app-layer">
        <div class="sidebar-profile-trigger" onclick="showProfile(event)"></div>
    </div>

    <!-- 消息页（首页） -->
    <div class="main-container app-layer" id="app">
        <div class="menu-trigger" onclick="toggleMenu(event)"></div>
        <div class="close-overlay" onclick="toggleMenu(event)"></div>
    </div>

    <!-- 底部 Tab -->
    <div class="tab-bar">
        <button class="tab-btn active" id="tabHome" onclick="switchTab('home')"></button>
        <button class="tab-btn" id="tabYoujian" onclick="switchTab('youjian')"></button>
        <button class="tab-btn" id="tabWendang" onclick="switchTab('wendang')"></button>
        <button class="tab-btn" id="tabGongzuotai" onclick="switchTab('gongzuotai')"></button>
        <button class="tab-btn" id="tabTongxunlu" onclick="switchTab('tongxunlu')"></button>
    </div>

    <!-- 邮件页 -->
    <div class="page-layer youjian-layer" id="pageYoujian"></div>

    <!-- 文档页 -->
    <div class="page-layer wendang-layer" id="pageWendang"></div>

    <!-- 工作台页 -->
    <div class="page-layer gongzuotai-layer" id="pageGongzuotai"></div>

    <!-- 通讯录页 -->
    <div class="page-layer tongxunlu-layer" id="pageTongxunlu"></div>

    <!-- 个人资料页 -->
    <div class="profile-layer app-layer" id="profilePage">
        <div class="profile-back-trigger" onclick="hideProfile(event)"></div>
    </div>

    <script>
        function toggleMenu(e) {
            e.stopPropagation();
            document.getElementById('app').classList.toggle('open');
        }

        function switchTab(tab) {
            // 关闭侧边栏
            document.getElementById('app').classList.remove('open');

            // 隐藏所有频道页
            document.querySelectorAll('.page-layer').forEach(el => el.classList.remove('show'));

            // 取消所有 Tab 高亮
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));

            // 显示对应页面（不是首页的话）
            if (tab !== 'home') {
                const pageId = 'page' + tab.charAt(0).toUpperCase() + tab.slice(1);
                const pageEl = document.getElementById(pageId);
                if (pageEl) pageEl.classList.add('show');
            }

            // 高亮当前 Tab
            const tabId = 'tab' + tab.charAt(0).toUpperCase() + tab.slice(1);
            const tabEl = document.getElementById(tabId);
            if (tabEl) tabEl.classList.add('active');
        }

        function showProfile(e) {
            e.stopPropagation();
            document.getElementById('profilePage').classList.add('show');
        }

        function hideProfile(e) {
            e.stopPropagation();
            document.getElementById('profilePage').classList.remove('show');
        }

        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });

        /* ========================================= */
        /* 橡皮筋弹性滑动（个人资料页） */
        /* ========================================= */
        (function() {
            var el = document.getElementById('profilePage');
            var startY = 0;
            var startX = 0;
            var distY = 0;
            var distX = 0;
            var dragging = false;
            var R = 0.04;       // 阻力系数（1/10）
            var MAX = 12;       // 最大拉伸 12px

            el.addEventListener('touchstart', function(e) {
                dragging = true;
                startY = e.touches[0].clientY;
                startX = e.touches[0].clientX;
                // 记住当前 transform（可能是 translateX(0)）
                el.style.transition = 'none';
            }, { passive: true });

            el.addEventListener('touchmove', function(e) {
                if (!dragging) return;
                e.preventDefault();

                distY = e.touches[0].clientY - startY;
                distX = e.touches[0].clientX - startX;

                // 垂直滑动为主时才处理
                if (Math.abs(distY) <= Math.abs(distX)) return;

                // 橡皮筋：超出边界的阻力效果
                var resisted = distY * R;
                if (resisted > MAX)  resisted = MAX + (resisted - MAX) * 0.1;
                if (resisted < -MAX) resisted = -MAX + (resisted + MAX) * 0.1;

                // 在当前位置上叠加垂直偏移
                el.style.transform = 'translateX(0) translateY(' + resisted + 'px)';
            }, { passive: false });

            function springBack() {
                el.style.transition = 'transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
                el.style.transform = 'translateX(0) translateY(0)';
                setTimeout(function() {
                    el.style.transition = 'transform 0.4s cubic-bezier(0.19, 1, 0.22, 1)';
                }, 600);
            }

            el.addEventListener('touchend', function() {
                if (!dragging) return;
                dragging = false;
                springBack();
            });

            el.addEventListener('touchcancel', function() {
                if (!dragging) return;
                dragging = false;
                springBack();
            });
        })();
    </script>
</body>
</html>
