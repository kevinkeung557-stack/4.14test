<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>企业微信</title>
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            image-rendering: -webkit-optimize-contrast;
            color-profile: sRGB;
        }

        .app-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* ========== 侧边栏 ========== */
        .sidebar-bg {
            background-image: url('sidebar.png');
            z-index: 10;
        }

        /* 侧边栏上的头像/名字区域 — 始终在最顶层 */
        .sidebar-profile-trigger {
            position: absolute;
            top: 40px;
            left: 0;
            width: 300px;
            height: 120px;
            z-index: 400;
            cursor: pointer;
        }

        /* ========== 首页（消息页） ========== */
        .main-container {
            background-image: url('home.png');
            z-index: 30;
            transform: translateY(-5px);
        }

        .main-container.open {
            transform: translateX(85vw) translateY(-5px) scale(0.94);
            border-radius: 12px;
        }

        .main-container,
        .main-container.open {
            transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1), border-radius 0.4s;
        }

        /* 关闭遮罩 — 侧边栏打开时覆盖首页，点一下关闭侧边栏 */
        .close-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 41;
        }
        .main-container.open .close-overlay {
            display: block;
        }

        /* ========== 汉堡菜单按钮 — 独立于首页，永远可点击 ========== */
        .menu-trigger {
            position: fixed;
            top: 0;
            left: 0;
            width: 70px;
            height: 100px;
            z-index: 500;
            cursor: pointer;
        }

        /* ========== 底部 Tab 栏 ========== */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 68px;
            z-index: 200;
            display: flex;
        }

        .tab-btn {
            flex: 1;
            height: 100%;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        /* ========== 频道页面 ========== */
        .page-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 60;
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
        }

        .page-layer.show {
            visibility: visible;
            opacity: 1;
            pointer-events: auto;
        }

        .youjian-layer    { background-image: url('youjian.png'); }
        .wendang-layer    { background-image: url('wendang.png'); }
        .gongzuotai-layer { background-image: url('gongzuotai.png'); }
        .tongxunlu-layer  { background-image: url('tongxunlu.png'); }

        /* ========== 个人资料页 ========== */
        .profile-layer {
            z-index: 100;
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
        }

        .profile-layer.show {
            visibility: visible;
            opacity: 1;
            pointer-events: auto;
        }

        /* 内容层：背景图 + 橡皮筋触摸 */
        .profile-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('profile.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
            touch-action: pan-y;
        }

        .profile-back-trigger {
            position: absolute;
            top: 40px;
            left: 0;
            width: 80px;
            height: 60px;
            z-index: 110;
            cursor: pointer;
        }

    </style>
</head>
<body>

    <!-- 侧边栏 -->
    <div class="sidebar-bg app-layer">
        <div class="sidebar-profile-trigger" onclick="showProfile(event)"></div>
    </div>

    <!-- 首页（消息页） -->
    <div class="main-container app-layer" id="app">
        <div class="close-overlay" onclick="closeSidebar()"></div>
    </div>

    <!-- 汉堡菜单按钮 — 独立于首页，永远在最上层 -->
    <div class="menu-trigger" onclick="toggleSidebar()"></div>

    <!-- 底部 Tab -->
    <div class="tab-bar">
        <button class="tab-btn active" id="tabHome" onclick="switchTab('home')"></button>
        <button class="tab-btn" id="tabYoujian" onclick="switchTab('youjian')"></button>
        <button class="tab-btn" id="tabWendang" onclick="switchTab('wendang')"></button>
        <button class="tab-btn" id="tabGongzuotai" onclick="switchTab('gongzuotai')"></button>
        <button class="tab-btn" id="tabTongxunlu" onclick="switchTab('tongxunlu')"></button>
    </div>

    <!-- 邮件页 -->
    <div class="page-layer youjian-layer" id="pageYoujian"></div>

    <!-- 文档页 -->
    <div class="page-layer wendang-layer" id="pageWendang"></div>

    <!-- 工作台页 -->
    <div class="page-layer gongzuotai-layer" id="pageGongzuotai"></div>

    <!-- 通讯录页 -->
    <div class="page-layer tongxunlu-layer" id="pageTongxunlu"></div>

    <!-- 个人资料页 -->
    <div class="profile-layer" id="profilePage">
        <div class="profile-content" id="profileContent"></div>
        <div class="profile-back-trigger" onclick="hideProfile(event)"></div>
    </div>

    <script>
        /* 侧边栏切换 */
        function toggleSidebar() {
            document.getElementById('app').classList.toggle('open');
        }

        function closeSidebar() {
            document.getElementById('app').classList.remove('open');
        }

        /* Tab 切换 */
        function switchTab(tab) {
            // 关闭侧边栏
            document.getElementById('app').classList.remove('open');

            // 隐藏所有频道页
            document.querySelectorAll('.page-layer').forEach(el => el.classList.remove('show'));

            // 取消所有 Tab 高亮
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));

            // 显示对应页面
            if (tab !== 'home') {
                var pageEl = document.getElementById('page' + tab.charAt(0).toUpperCase() + tab.slice(1));
                if (pageEl) pageEl.classList.add('show');
            }

            // 高亮当前 Tab
            var tabEl = document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1));
            if (tabEl) tabEl.classList.add('active');
        }

        /* 个人资料页 */
        function showProfile(e) {
            e.stopPropagation();
            document.getElementById('profilePage').classList.add('show');
        }

        function hideProfile(e) {
            e.stopPropagation();
            document.getElementById('profilePage').classList.remove('show');
        }

        /* ========================================= */
        /* 橡皮筋弹性滑动（个人资料页） */
        /* ========================================= */
        (function() {
            var content = document.getElementById('profileContent');
            var startY = 0;
            var startTranslateY = 0;
            var distY = 0;
            var dragging = false;
            var RESISTANCE = 0.4;
            var MAX_DRAG = 120;

            content.addEventListener('touchstart', function(e) {
                dragging = true;
                startY = e.touches[0].clientY;
                startTranslateY = getCurrentTranslateY();
                content.style.transition = 'none';
            }, { passive: true });

            content.addEventListener('touchmove', function(e) {
                if (!dragging) return;
                e.preventDefault();
                distY = e.touches[0].clientY - startY;
                var offset = Math.sign(distY) * Math.min(Math.abs(distY) * RESISTANCE, MAX_DRAG);
                content.style.transform = 'translateY(' + (startTranslateY + offset) + 'px)';
            }, { passive: false });

            function springBack() {
                content.style.transition = 'transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
                content.style.transform = 'translateY(0)';
                setTimeout(function() {
                    content.style.transition = 'none';
                }, 600);
            }

            content.addEventListener('touchend', function() {
                if (!dragging) return;
                dragging = false;
                springBack();
            });

            content.addEventListener('touchcancel', function() {
                if (!dragging) return;
                dragging = false;
                springBack();
            });

            function getCurrentTranslateY() {
                var m = window.getComputedStyle(content).transform;
                if (m === 'none') return 0;
                var parts = m.split(',');
                return parseFloat(parts[5]) || 0;
            }
        })();

        /* 全局禁止弹性滚动 */
        document.addEventListener('touchmove', function(e) {
            var profile = document.getElementById('profilePage');
            if (!profile.classList.contains('show')) return;
            e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
