<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>企业微信</title>
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            image-rendering: -webkit-optimize-contrast;
            color-profile: sRGB;
        }

        .app-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* 1. 侧边栏层 */
        .sidebar-bg {
            background-image: url('sidebar.png');
            z-index: 10;
        }

        .sidebar-profile-trigger {
            position: absolute;
            top: 40px;
            left: 0;
            width: 300px;
            height: 120px;
            z-index: 20;
        }

        /* 2. 首页主容器 */
        .main-container {
            background-image: url('home.png');
            z-index: 30;
            transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1), border-radius 0.4s;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            transform: translateY(-5px); 
        }

        .main-container.open {
            transform: translateX(85vw) translateY(-5px) scale(0.94);
            border-radius: 12px;
        }

        .menu-trigger {
            position: absolute;
            top: 0; left: 0; width: 70px; height: 100px; z-index: 40;
        }

        .close-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none; z-index: 41;
        }
        #app.open .close-overlay { display: block; }

        /* 底部 TabBar 热区 */
        .tab-bar-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 84px;
            display: flex;
            z-index: 50;
        }
        .tab-item { flex: 1; height: 100%; }

        /* ========================================= */
        /* 3. 个人资料页 (水平侧滑 + 内部上下滑动) */
        /* ========================================= */
        .profile-layer {
            background-color: #f5f5f5;
            z-index: 100;
            /* 改回水平初始位置：在右侧隐藏 */
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            box-shadow: -10px 0 30px rgba(0,0,0,0.2);
            
            /* 允许内容上下滑动 */
            overflow-y: scroll;
            -webkit-overflow-scrolling: touch;
            
            /* 关键：手势由 JS 处理，禁止浏览器横向默认翻页 */
            touch-action: pan-y; 
        }

        .profile-layer.show {
            transform: translateX(0);
        }

        .profile-img-content {
            width: 100%;
            height: auto;
            display: block;
            min-height: 100.1vh;
        }

        /* 返回热区：固定在左上角 */
        .profile-back-trigger {
            position: fixed;
            top: 40px;
            left: 0;
            width: 80px;
            height: 60px;
            z-index: 110;
        }

    </style>
</head>
<body>

    <div class="sidebar-bg app-layer">
        <div class="sidebar-profile-trigger" id="toProfileBtn"></div>
    </div>

    <div class="main-container app-layer" id="app">
        <div class="menu-trigger" onclick="toggleMenu(event)"></div>
        <div class="close-overlay" onclick="toggleMenu(event)"></div>

        <div class="tab-bar-container">
            <div class="tab-item" onclick="switchTab('home.png', event)"></div>
            <div class="tab-item" onclick="switchTab('youjian.png', event)"></div>
            <div class="tab-item" onclick="switchTab('wendang.png', event)"></div>
            <div class="tab-item" onclick="switchTab('gongzuotai.png', event)"></div>
            <div class="tab-item" onclick="switchTab('tongxunlu.png', event)"></div>
        </div>
    </div>

    <div class="profile-layer app-layer" id="profilePage">
        <div class="profile-back-trigger" id="profileBackBtn" onclick="hideProfile(event)"></div>
        < img src="profile.png" class="profile-img-content">
    </div>

    <script>
        const app = document.getElementById('app');
        const profilePage = document.getElementById('profilePage');

        function switchTab(imgName, e) {
            e.stopPropagation();
            app.style.backgroundImage = `url('${imgName}')`;
        }

        function toggleMenu(e) {
            e.stopPropagation();
            app.classList.toggle('open');
        }

        function showProfile() {
            profilePage.classList.add('show');
            profilePage.style.transform = 'translateX(0)';
        }

        function hideProfile(e) {
            if(e) e.stopPropagation();
            profilePage.classList.remove('show');
            profilePage.style.transform = 'translateX(100%)';
            setTimeout(() => { profilePage.scrollTop = 0; }, 400);
        }

        document.getElementById('toProfileBtn').addEventListener('click', showProfile);

        // =========================================
        // 水平手势：向右滑动关闭 Page 3
        // =========================================
        let startX = 0;
        let currentX = 0;
        let isMoving = false;

        profilePage.addEventListener('touchstart', (e) => {
            // 只有当在页面左侧边缘滑动时，或者整体水平滑动
            startX = e.touches[0].clientX;
            profilePage.style.transition = 'none';
            isMoving = true;
        });

        profilePage.addEventListener('touchmove', (e) => {
            if (!isMoving) return;
            const moveX = e.touches[0].clientX - startX;
            
            // 只有向右滑 (moveX > 0) 才触发
            if (moveX > 0) {
                profilePage.style.transform = `translateX(${moveX}px)`;
                currentX = moveX;
            }
        });

        profilePage.addEventListener('touchend', () => {
            isMoving = false;
            profilePage.style.transition = 'transform 0.4s cubic-bezier(0.19, 1, 0.22, 1)';
            
            // 滑动超过屏幕 1/3 则关闭
            if (currentX > window.innerWidth / 3) {
                hideProfile();
            } else {
                profilePage.style.transform = 'translateX(0)';
            }
            currentX = 0;
        });

        // 阻止系统默认行为
        document.addEventListener('touchmove', (e) => {
            if (!profilePage.contains(e.target)) e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
