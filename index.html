<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>企业微信</title>
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* 侧边栏 */
        #sidebar { background-image: url('sidebar.png'); z-index: 10; }

        /* 侧边栏头像热区 */
        #sidebarProfile {
            position: fixed; top: 40px; left: 0;
            width: 300px; height: 120px;
            z-index: 400; cursor: pointer;
        }

        /* 首页 */
        #home {
            background-image: url('home.png');
            z-index: 30;
            transform: translateY(-5px);
            transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1), border-radius 0.4s;
        }
        #home.open {
            transform: translateX(85vw) translateY(-5px) scale(0.94);
            border-radius: 12px;
        }

        /* 关闭遮罩 */
        #closeMask {
            position: fixed; top: 0; left: 15vw;
            width: 85vw; height: 100vh;
            z-index: 41; display: none;
        }
        #home.open ~ #closeMask { display: block; }

        /* 汉堡热区 */
        #hamburger {
            position: fixed; top: 0; left: 0;
            width: 90px; height: 120px;
            z-index: 500; cursor: pointer;
        }

        /* Tab 栏 */
        #tabBar {
            position: fixed; bottom: 0; left: 0;
            width: 100vw; height: 68px;
            z-index: 200; display: flex;
        }
        .tab {
            flex: 1; height: 100%;
            background: transparent; border: none; cursor: pointer;
        }

        /* 频道页面 */
        .page {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 60;
            visibility: hidden; opacity: 0; pointer-events: none;
        }
        .page.show {
            visibility: visible; opacity: 1; pointer-events: auto;
        }
        #pj    { background-image: url('youjian.png'); }
        #pwd   { background-image: url('wendang.png'); }
        #pgzt  { background-image: url('gongzuotai.png'); }
        #ptxl  { background-image: url('tongxunlu.png'); }

        /* ========================================= */
        /* 个人资料页 — 滑入滑出动画 (核心修复区)      */
        /* ========================================= */
        #profile {
            background-image: url('profile.png');
            z-index: 100;
            transform: translateX(100%);
            /* 【修复】加入 visibility 的延迟过渡，保证滑出时先播放0.4s位移动画，然后再隐藏 */
            transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1), visibility 0s 0.4s;
            visibility: hidden; pointer-events: none;
        }
        #profile.show {
            transform: translateX(0);
            visibility: visible; pointer-events: auto;
            /* 【修复】滑入时 visibility 立即生效(0s延迟)，直接触发位移动画 */
            transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1), visibility 0s 0s;
        }

        /* 返回按钮 */
        #profileBack {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 300; cursor: pointer;
            display: none; pointer-events: none;
        }
        #profileBack.show {
            display: block; pointer-events: auto;
        }

    </style>
</head>
<body>

    <div class="layer" id="sidebar"></div>

    <div id="sidebarProfile"></div>

    <div class="layer" id="home">
        <div id="closeMask"></div>
    </div>

    <div id="hamburger"></div>

    <div id="tabBar">
        <button class="tab active" id="tHome"></button>
        <button class="tab" id="tYj"></button>
        <button class="tab" id="tWd"></button>
        <button class="tab" id="tGzt"></button>
        <button class="tab" id="tTxl"></button>
    </div>

    <div class="page" id="pj"></div>
    <div class="page" id="pwd"></div>
    <div class="page" id="pgzt"></div>
    <div class="page" id="ptxl"></div>

    <div class="layer" id="profile"></div>

    <div id="profileBack"></div>

    <script>
        var home = document.getElementById('home');
        var closeMask = document.getElementById('closeMask');
        var hamburger = document.getElementById('hamburger');
        var sidebarProfile = document.getElementById('sidebarProfile');
        var profile = document.getElementById('profile');
        var profileBack = document.getElementById('profileBack');

        /* 打开/关闭侧边栏 */
        hamburger.addEventListener('click', function(e) {
            e.stopPropagation();
            home.classList.toggle('open');
        });

        closeMask.addEventListener('click', function(e) {
            e.stopPropagation();
            home.classList.remove('open');
        });

        /* 打开个人资料（滑入） */
        sidebarProfile.addEventListener('click', function(e) {
            e.stopPropagation();
            home.classList.remove('open');
            hamburger.style.display = 'none';
            // 【修复 Bug】强行隐藏头像热区，防止它挡住资料页左上角的返回点击
            sidebarProfile.style.display = 'none'; 
            
            profile.classList.add('show');
            profileBack.classList.add('show');
        });

        /* 关闭个人资料（滑退） */
        profileBack.addEventListener('click', function(e) {
            e.stopPropagation();
            profile.classList.remove('show');
            profileBack.classList.remove('show');
            
            setTimeout(function() {
                hamburger.style.display = '';
                // 【修复 Bug】动画完全结束(0.4s)后，再把头像热区恢复
                sidebarProfile.style.display = ''; 
            }, 400);
        });

        /* Tab 切换 */
        var pages = { Yj: 'pj', Wd: 'pwd', Gzt: 'pgzt', Txl: 'ptxl' };
        ['Home', 'Yj', 'Wd', 'Gzt', 'Txl'].forEach(function(tab) {
            document.getElementById('t' + tab).addEventListener('click', function() {
                home.classList.remove('open');
                Object.values(pages).forEach(function(id) {
                    document.getElementById(id).classList.remove('show');
                });
                document.querySelectorAll('.tab').forEach(function(b) { b.classList.remove('active'); });
                if (tab !== 'Home') {
                    document.getElementById(pages[tab]).classList.add('show');
                }
                document.getElementById('t' + tab).classList.add('active');
            });
        });
    </script>
</body>
</html>
