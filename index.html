<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>企业微信</title>
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            image-rendering: -webkit-optimize-contrast;
            color-profile: sRGB;
        }

        .app-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* 侧边栏 */
        .sidebar-bg {
            background-image: url('sidebar.png');
            z-index: 10;
        }

        .sidebar-profile-trigger {
            position: absolute;
            top: 40px;
            left: 0;
            width: 300px;
            height: 120px;
            z-index: 20;
        }

        /* 消息页（首页） */
        .main-container {
            background-image: url('home.png');
            z-index: 30;
            transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1), border-radius 0.4s;
            transform: translateY(-5px);
        }

        .main-container.open {
            transform: translateX(85vw) translateY(-5px) scale(0.94);
            border-radius: 12px;
        }

        .menu-trigger {
            position: absolute;
            top: 0;
            left: 0;
            width: 70px;
            height: 100px;
            z-index: 40;
        }

        .close-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 41;
        }
        .main-container.open .close-overlay {
            display: block;
        }

        /* 底部 Tab 栏 */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 68px;
            z-index: 200;
            display: flex;
        }

        .tab-btn {
            flex: 1;
            height: 100%;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        /* 频道页面 */
        .page-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 60;
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
        }

        .page-layer.show {
            visibility: visible;
            opacity: 1;
            pointer-events: auto;
        }

        .youjian-layer    { background-image: url('youjian.png'); }
        .wendang-layer    { background-image: url('wendang.png'); }
        .gongzuotai-layer { background-image: url('gongzuotai.png'); }
        .tongxunlu-layer  { background-image: url('tongxunlu.png'); }

        /* 个人资料页 */
        .profile-layer {
            background-image: url('profile.png');
            z-index: 100;
            /* 不再用 translateX 滑入，改为 visibility 控制 */
            transform: translateX(0);
        }

        .profile-layer.show {
            transform: translateX(0);
        }

        .profile-back-trigger {
            position: absolute;
            top: 40px;
            left: 0;
            width: 80px;
            height: 60px;
            z-index: 110;
            cursor: pointer;
        }

        /* 橡皮筋弹性滑动 */
        .profile-layer .scroll-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            touch-action: pan-y;
            cursor: grab;
        }

        .profile-layer .scroll-content.dragging {
            cursor: grabbing;
        }

    </style>
</head>
<body>

    <!-- 侧边栏 -->
    <div class="sidebar-bg app-layer">
        <div class="sidebar-profile-trigger" onclick="showProfile(event)"></div>
    </div>

    <!-- 消息页（首页） -->
    <div class="main-container app-layer" id="app">
        <div class="menu-trigger" onclick="toggleMenu(event)"></div>
        <div class="close-overlay" onclick="toggleMenu(event)"></div>
    </div>

    <!-- 底部 Tab -->
    <div class="tab-bar">
        <button class="tab-btn active" id="tabHome" onclick="switchTab('home')"></button>
        <button class="tab-btn" id="tabYoujian" onclick="switchTab('youjian')"></button>
        <button class="tab-btn" id="tabWendang" onclick="switchTab('wendang')"></button>
        <button class="tab-btn" id="tabGongzuotai" onclick="switchTab('gongzuotai')"></button>
        <button class="tab-btn" id="tabTongxunlu" onclick="switchTab('tongxunlu')"></button>
    </div>

    <!-- 邮件页 -->
    <div class="page-layer youjian-layer" id="pageYoujian"></div>

    <!-- 文档页 -->
    <div class="page-layer wendang-layer" id="pageWendang"></div>

    <!-- 工作台页 -->
    <div class="page-layer gongzuotai-layer" id="pageGongzuotai"></div>

    <!-- 通讯录页 -->
    <div class="page-layer tongxunlu-layer" id="pageTongxunlu"></div>

    <!-- 个人资料页 -->
    <div class="profile-layer app-layer" id="profilePage">
        <div class="scroll-content" id="profileScroll"></div>
        <div class="profile-back-trigger" onclick="hideProfile(event)"></div>
    </div>

    <script>
        function toggleMenu(e) {
            e.stopPropagation();
            document.getElementById('app').classList.toggle('open');
        }

        function switchTab(tab) {
            document.getElementById('app').classList.remove('open');
            document.querySelectorAll('.page-layer').forEach(el => el.classList.remove('show'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if (tab !== 'home') {
                const pageEl = document.getElementById('page' + tab.charAt(0).toUpperCase() + tab.slice(1));
                if (pageEl) pageEl.classList.add('show');
            }
            const tabEl = document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1));
            if (tabEl) tabEl.classList.add('active');
        }

        function showProfile(e) {
            e.stopPropagation();
            document.getElementById('profilePage').classList.add('show');
        }

        function hideProfile(e) {
            e.stopPropagation();
            document.getElementById('profilePage').classList.remove('show');
        }

        /* ========================================= */
        /* 橡皮筋弹性滑动（个人资料页专用） */
        /* ========================================= */
        (function() {
            const scrollEl = document.getElementById('profileScroll');
            const layer = document.getElementById('profilePage');

            let startY = 0;
            let currentY = 0;
            let distY = 0;
            let dragging = false;
            const RESISTANCE = 0.4;   // 拉得越远，阻力越大（值越小阻力越大）
            const MAX_DRAG = 120;     // 最大弹性拉伸距离（px）

            function getTranslateY() {
                const style = window.getComputedStyle(scrollEl);
                return parseFloat(style.transform.split(',')[5]) || 0;
            }

            scrollEl.addEventListener('touchstart', function(e) {
                dragging = true;
                startY = e.touches[0].clientY;
                scrollEl.classList.add('dragging');
                scrollEl.style.transition = 'none';
            }, { passive: true });

            scrollEl.addEventListener('touchmove', function(e) {
                if (!dragging) return;
                e.preventDefault();

                currentY = e.touches[0].clientY;
                distY = currentY - startY;

                // 橡皮筋：超出边界的部分乘以阻力系数，限制最大值
                let offset = distY;
                if (Math.abs(distY) > 10) {
                    // sign * MAX_DRAG * (1 - RESISTANCE * (1 / (Math.abs(distY) / MAX_DRAG + 1)))
                    // 简单版：用阻力系数衰减
                    const sign = distY > 0 ? 1 : -1;
                    const absDist = Math.abs(distY);
                    const resisted = sign * (absDist * RESISTANCE + MAX_DRAG * (1 - RESISTANCE)) * (1 - 1 / (absDist / 50 + 1));
                    offset = sign * Math.min(Math.abs(distY) * RESISTANCE + MAX_DRAG * 0.3, MAX_DRAG) * Math.sign(distY);

                    // 简单粗暴版：直接限制最大偏移
                    offset = sign * Math.min(absDist * RESISTANCE, MAX_DRAG);
                }

                scrollEl.style.transform = 'translateY(' + offset + 'px)';
            }, { passive: false });

            scrollEl.addEventListener('touchend', function(e) {
                if (!dragging) return;
                dragging = false;
                scrollEl.classList.remove('dragging');

                // 弹回原位
                scrollEl.style.transition = 'transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';
                scrollEl.style.transform = 'translateY(0)';

                // 清除 transition，避免影响下次拖拽
                setTimeout(function() {
                    scrollEl.style.transition = 'none';
                }, 500);
            });

            scrollEl.addEventListener('touchcancel', function(e) {
                dragging = false;
                scrollEl.classList.remove('dragging');
                scrollEl.style.transition = 'transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';
                scrollEl.style.transform = 'translateY(0)';
                setTimeout(function() {
                    scrollEl.style.transition = 'none';
                }, 500);
            });
        })();

        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
