<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>企业微信</title>
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            image-rendering: -webkit-optimize-contrast;
            color-profile: sRGB;
        }

        .app-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* 1. 侧边栏层 */
        .sidebar-bg {
            background-image: url('sidebar.png');
            z-index: 10;
        }

        .sidebar-profile-trigger {
            position: absolute;
            top: 40px;
            left: 0;
            width: 300px;
            height: 120px;
            z-index: 20;
        }

        /* 2. 首页主容器 */
        .main-container {
            /* 初始背景图为消息页 */
            background-image: url('home.png');
            z-index: 30;
            transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1), border-radius 0.4s;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            transform: translateY(-5px); 
        }

        .main-container.open {
            transform: translateX(85vw) translateY(-5px) scale(0.94);
            border-radius: 12px;
        }

        /* 菜单触发热区 */
        .menu-trigger {
            position: absolute;
            top: 0; left: 0; width: 70px; height: 100px; z-index: 40;
        }

        .close-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none; z-index: 41;
        }
        #app.open .close-overlay { display: block; }

        /* ========================================= */
        /* 【核心新增】底部 TabBar 热区布局 */
        /* ========================================= */
        .tab-bar-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 84px; /* 适配 iPhone 底部 Tab 区域高度 */
            display: flex;
            z-index: 50;
        }

        .tab-item {
            flex: 1;
            height: 100%;
            /* background: rgba(255, 0, 0, 0.1); */ /* 调试用：打开可以看到 5 个格子的位置 */
        }

        /* ========================================= */
        /* 3. 个人资料页 (Page 3) */
        /* ========================================= */
        .profile-layer {
            background-color: #f5f5f5;
            z-index: 100;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            overflow-y: scroll;
            -webkit-overflow-scrolling: touch;
            touch-action: none;
        }

        .profile-layer.show {
            transform: translateY(0);
        }

        .profile-img-content {
            width: 100%;
            height: auto;
            display: block;
            min-height: 100.1vh;
        }

        .profile-back-trigger {
            position: fixed;
            top: 40px;
            left: 0;
            width: 80px;
            height: 60px;
            z-index: 110;
        }

    </style>
</head>
<body>

    <div class="sidebar-bg app-layer">
        <div class="sidebar-profile-trigger" id="toProfileBtn"></div>
    </div>

    <div class="main-container app-layer" id="app">
        <div class="menu-trigger" onclick="toggleMenu(event)"></div>
        <div class="close-overlay" onclick="toggleMenu(event)"></div>

        <div class="tab-bar-container">
            <div class="tab-item" onclick="switchTab('home.png', event)"></div>
            <div class="tab-item" onclick="switchTab('youjian.png', event)"></div>
            <div class="tab-item" onclick="switchTab('wendang.png', event)"></div>
            <div class="tab-item" onclick="switchTab('gongzuotai.png', event)"></div>
            <div class="tab-item" onclick="switchTab('tongxunlu.png', event)"></div>
        </div>
    </div>

    <div class="profile-layer app-layer" id="profilePage">
        <div class="profile-back-trigger" id="profileBackBtn"></div>
        < img src="profile.png" class="profile-img-content">
    </div>

    <script>
        const app = document.getElementById('app');
        const profilePage = document.getElementById('profilePage');

        // 切换 Tab 逻辑：点击底部热区更换首页背景图
        function switchTab(imgName, e) {
            e.stopPropagation();
            app.style.backgroundImage = `url('${imgName}')`;
        }

        // 侧边栏逻辑
        function toggleMenu(e) {
            e.stopPropagation();
            app.classList.toggle('open');
        }

        // 个人页滑入手势逻辑（保持之前你满意的版本）
        document.getElementById('toProfileBtn').addEventListener('click', () => {
            profilePage.classList.add('show');
            profilePage.style.transform = 'translateY(0)';
        });

        document.getElementById('profileBackBtn').addEventListener('click', () => {
            profilePage.classList.remove('show');
            profilePage.style.transform = 'translateY(100%)';
        });

        // 简易上下滑动弹性还原
        let startY = 0;
        let currentY = 0;
        profilePage.addEventListener('touchstart', (e) => {
            startY = e.touches[0].clientY;
            profilePage.style.transition = 'none';
        });
        profilePage.addEventListener('touchmove', (e) => {
            currentY = e.touches[0].clientY - startY;
            if (currentY > 0) profilePage.style.transform = `translateY(${currentY}px)`;
        });
        profilePage.addEventListener('touchend', () => {
            profilePage.style.transition = 'transform 0.4s cubic-bezier(0.19, 1, 0.22, 1)';
            if (currentY > 200) {
                profilePage.classList.remove('show');
                profilePage.style.transform = 'translateY(100%)';
            } else {
                profilePage.style.transform = 'translateY(0)';
            }
            currentY = 0;
        });

        document.addEventListener('touchmove', (e) => {
            if (!profilePage.contains(e.target)) e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
