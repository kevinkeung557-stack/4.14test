<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>企业微信</title>
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            image-rendering: -webkit-optimize-contrast;
            color-profile: sRGB;
        }

        .app-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* 侧边栏 */
        .sidebar-bg {
            background-image: url('sidebar.png');
            z-index: 10;
        }

        .sidebar-profile-trigger {
            position: absolute;
            top: 40px;
            left: 0;
            width: 300px;
            height: 120px;
            z-index: 20;
        }

        /* 消息页（首页） */
        .main-container {
            background-image: url('home.png');
            z-index: 30;
            transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1), border-radius 0.4s;
            transform: translateY(-5px);
        }

        .main-container.open {
            transform: translateX(85vw) translateY(-5px) scale(0.94);
            border-radius: 12px;
        }

        .menu-trigger {
            position: absolute;
            top: 0;
            left: 0;
            width: 70px;
            height: 100px;
            z-index: 40;
        }

        .close-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 41;
        }
        .main-container.open .close-overlay {
            display: block;
        }

        /* 底部 Tab 栏 */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 68px;
            z-index: 200;
            display: flex;
        }

        .tab-btn {
            flex: 1;
            height: 100%;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        /* 频道页面 */
        .page-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 60;
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
        }

        .page-layer.show {
            visibility: visible;
            opacity: 1;
            pointer-events: auto;
        }

        .youjian-layer    { background-image: url('youjian.png'); }
        .wendang-layer    { background-image: url('wendang.png'); }
        .gongzuotai-layer { background-image: url('gongzuotai.png'); }
        .tongxunlu-layer  { background-image: url('tongxunlu.png'); }

        /* 个人资料页 */
        .profile-layer {
            z-index: 100;
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
        }

        .profile-layer.show {
            visibility: visible;
            opacity: 1;
            pointer-events: auto;
        }

        .profile-back-trigger {
            position: absolute;
            top: 40px;
            left: 0;
            width: 80px;
            height: 60px;
            z-index: 110;
            cursor: pointer;
        }

        /* 内容层：背景图 + 触摸事件都在这里 */
        .profile-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('profile.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
            touch-action: pan-y;
            cursor: grab;
        }

        .profile-content.dragging {
            cursor: grabbing;
        }

    </style>
</head>
<body>

    <!-- 侧边栏 -->
    <div class="sidebar-bg app-layer">
        <div class="sidebar-profile-trigger" onclick="showProfile(event)"></div>
    </div>

    <!-- 消息页（首页） -->
    <div class="main-container app-layer" id="app">
        <div class="menu-trigger" onclick="toggleMenu(event)"></div>
        <div class="close-overlay" onclick="toggleMenu(event)"></div>
    </div>

    <!-- 底部 Tab -->
    <div class="tab-bar">
        <button class="tab-btn active" id="tabHome" onclick="switchTab('home')"></button>
        <button class="tab-btn" id="tabYoujian" onclick="switchTab('youjian')"></button>
        <button class="tab-btn" id="tabWendang" onclick="switchTab('wendang')"></button>
        <button class="tab-btn" id="tabGongzuotai" onclick="switchTab('gongzuotai')"></button>
        <button class="tab-btn" id="tabTongxunlu" onclick="switchTab('tongxunlu')"></button>
    </div>

    <!-- 邮件页 -->
    <div class="page-layer youjian-layer" id="pageYoujian"></div>

    <!-- 文档页 -->
    <div class="page-layer wendang-layer" id="pageWendang"></div>

    <!-- 工作台页 -->
    <div class="page-layer gongzuotai-layer" id="pageGongzuotai"></div>

    <!-- 通讯录页 -->
    <div class="page-layer tongxunlu-layer" id="pageTongxunlu"></div>

    <!-- 个人资料页 -->
    <div class="profile-layer" id="profilePage">
        <div class="profile-content" id="profileContent"></div>
        <div class="profile-back-trigger" onclick="hideProfile(event)"></div>
    </div>

    <script>
        function toggleMenu(e) {
            e.stopPropagation();
            document.getElementById('app').classList.toggle('open');
        }

        function switchTab(tab) {
            document.getElementById('app').classList.remove('open');
            document.querySelectorAll('.page-layer').forEach(el => el.classList.remove('show'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if (tab !== 'home') {
                const pageEl = document.getElementById('page' + tab.charAt(0).toUpperCase() + tab.slice(1));
                if (pageEl) pageEl.classList.add('show');
            }
            const tabEl = document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1));
            if (tabEl) tabEl.classList.add('active');
        }

        function showProfile(e) {
            e.stopPropagation();
            document.getElementById('profilePage').classList.add('show');
        }

        function hideProfile(e) {
            e.stopPropagation();
            document.getElementById('profilePage').classList.remove('show');
        }

        /* ========================================= */
        /* 橡皮筋弹性滑动 */
        /* ========================================= */
        (function() {
            const content = document.getElementById('profileContent');

            let startY = 0;
            let startTranslateY = 0;
            let distY = 0;
            let dragging = false;
            const RESISTANCE = 0.4;
            const MAX_DRAG = 120;

            content.addEventListener('touchstart', function(e) {
                dragging = true;
                startY = e.touches[0].clientY;
                startTranslateY = getCurrentTranslateY();
                content.style.transition = 'none';
                content.classList.add('dragging');
            }, { passive: true });

            content.addEventListener('touchmove', function(e) {
                if (!dragging) return;
                e.preventDefault();

                distY = e.touches[0].clientY - startY;

                // 阻力：实际拉动距离 * RESISTANCE，上限 MAX_DRAG
                const offset = Math.sign(distY) * Math.min(Math.abs(distY) * RESISTANCE, MAX_DRAG);
                content.style.transform = 'translateY(' + (startTranslateY + offset) + 'px)';
            }, { passive: false });

            function springBack() {
                content.style.transition = 'transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
                content.style.transform = 'translateY(0)';
                setTimeout(function() {
                    content.style.transition = 'none';
                }, 600);
            }

            content.addEventListener('touchend', function() {
                if (!dragging) return;
                dragging = false;
                content.classList.remove('dragging');
                springBack();
            });

            content.addEventListener('touchcancel', function() {
                if (!dragging) return;
                dragging = false;
                content.classList.remove('dragging');
                springBack();
            });

            function getCurrentTranslateY() {
                const m = window.getComputedStyle(content).transform;
                if (m === 'none') return 0;
                const parts = m.split(',');
                return parseFloat(parts[5]) || 0;
            }
        })();

        document.addEventListener('touchmove', function(e) {
            // 仅当 profilePage 可见时阻止默认滚动
            var profile = document.getElementById('profilePage');
            if (!profile.classList.contains('show')) return;
            e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
